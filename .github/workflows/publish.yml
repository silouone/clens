name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.4"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match packages/cli version '$PKG'"
            exit 1
          fi
          echo "Tag and version agree: $PKG"
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
      - name: Publish (packages/cli only — root is private)
        run: npm publish -w packages/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
